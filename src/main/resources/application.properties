
spring.application.name=Bookshop
server.port=${SERVER_PORT:8080}

# ============== 数据库配置 ==============
# 默认值仅用于本地开发，生产环境请通过 .env 或系统环境变量覆盖
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/bookshop?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#spring.jpa.hibernate.ddl-auto=update
#spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.format_sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
#spring.sql.init.mode=always
#spring.sql.init.schema-locations=file:book.sql

# ============== Thymeleaf 模板配置 ==============
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# ============== JWT 配置 ==============
# 生产环境务必修改为足够长且随机的密钥
jwt.secret=${JWT_SECRET:BookshopSystem2025SecretKeyForJwtTokenGenerationMustBeLongEnough}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ============== 文件上传配置 ==============
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

upload.path=${UPLOAD_PATH:src/main/resources/static/uploads/}
