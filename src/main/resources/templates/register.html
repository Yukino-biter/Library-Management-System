<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书城管理系统 - 注册</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url('/loginback.webp') no-repeat center center fixed;
            background-size: cover;
        }
        body::before {
            content: '';
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 0;
        }
        .register-container {
            position: relative; z-index: 1;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 50px 40px;
            width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }
        .register-container h2 {
            text-align: center; color: #2c3e50;
            font-size: 28px; margin-bottom: 8px; font-weight: 700;
        }
        .register-container .subtitle {
            text-align: center; color: #7f8c8d;
            font-size: 14px; margin-bottom: 35px;
        }
        .form-group { margin-bottom: 22px; position: relative; }
        .form-group label {
            display: block; color: #34495e;
            font-size: 14px; font-weight: 600; margin-bottom: 8px;
        }
        .form-group input {
            width: 100%; padding: 12px 16px;
            border: 2px solid #e0e6ed; border-radius: 10px;
            font-size: 15px; transition: all 0.3s ease;
            outline: none; background: #f8f9fa;
        }
        .form-group input:focus {
            border-color: #27ae60; background: #fff;
            box-shadow: 0 0 0 3px rgba(39, 174, 96, 0.15);
        }
        .username-status {
            position: absolute; right: 12px; top: 38px;
            font-size: 12px; font-weight: 600;
        }
        .username-status.available { color: #27ae60; }
        .username-status.exists { color: #e74c3c; }
        .btn-register {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #27ae60, #219a52);
            color: white; border: none; border-radius: 10px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            transition: all 0.3s ease; margin-top: 10px;
        }
        .btn-register:hover {
            background: linear-gradient(135deg, #219a52, #1a7a40);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(39, 174, 96, 0.35);
        }
        .btn-register:disabled {
            background: #bdc3c7; cursor: not-allowed; transform: none; box-shadow: none;
        }
        .error-msg {
            background: #fdecea; color: #e74c3c;
            padding: 10px 14px; border-radius: 8px;
            font-size: 13px; margin-bottom: 20px;
            border-left: 4px solid #e74c3c;
        }
        .login-link {
            text-align: center; margin-top: 24px;
            font-size: 14px; color: #7f8c8d;
        }
        .login-link a {
            color: #3498db; text-decoration: none; font-weight: 600;
        }
        .login-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="register-container">
    <h2>用户注册</h2>
    <p class="subtitle">Create Your Account</p>

    <div th:if="${error}" class="error-msg" th:text="${error}"></div>

    <form th:action="@{/register}" method="post" onsubmit="return validateForm()">
        <div class="form-group">
            <label for="username">账号</label>
            <input type="text" id="username" name="username" placeholder="请输入账号"
                   th:value="${username}" required onblur="checkUsername()">
            <span id="usernameStatus" class="username-status"></span>
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" placeholder="请输入密码（至少6位）" required>
        </div>
        <div class="form-group">
            <label for="confirmPassword">确认密码</label>
            <input type="password" id="confirmPassword" placeholder="请再次输入密码" required>
        </div>
        <div class="form-group">
            <label for="nickname">昵称</label>
            <input type="text" id="nickname" name="nickname" placeholder="请输入昵称"
                   th:value="${nickname}" required>
        </div>
        <button type="submit" class="btn-register" id="btnRegister">注 册</button>
    </form>

    <div class="login-link">
        已有账号？<a th:href="@{/login}">返回登录</a>
    </div>
</div>

<script>
    var usernameAvailable = false;

    function checkUsername() {
        var username = document.getElementById('username').value.trim();
        var statusSpan = document.getElementById('usernameStatus');
        if (!username) {
            statusSpan.textContent = '';
            usernameAvailable = false;
            return;
        }
        var xhr = new XMLHttpRequest();
        xhr.open('GET', '/checkUsername?username=' + encodeURIComponent(username), true);
        xhr.onreadystatechange = function () {
            if (xhr.readyState === 4 && xhr.status === 200) {
                var result = xhr.responseText.trim();
                if (result === 'available') {
                    statusSpan.textContent = '可用';
                    statusSpan.className = 'username-status available';
                    usernameAvailable = true;
                } else if (result === 'exists') {
                    statusSpan.textContent = '已存在';
                    statusSpan.className = 'username-status exists';
                    usernameAvailable = false;
                } else {
                    statusSpan.textContent = '';
                    usernameAvailable = false;
                }
            }
        };
        xhr.send();
    }

    function validateForm() {
        var username = document.getElementById('username').value.trim();
        var password = document.getElementById('password').value.trim();
        var confirmPassword = document.getElementById('confirmPassword').value.trim();
        var nickname = document.getElementById('nickname').value.trim();

        if (!username) { alert('账号不能为空'); return false; }
        if (!password) { alert('密码不能为空'); return false; }
        if (password.length < 6) { alert('密码长度不能少于6位'); return false; }
        if (password !== confirmPassword) { alert('两次密码输入不一致'); return false; }
        if (!nickname) { alert('昵称不能为空'); return false; }
        if (!usernameAvailable) { alert('请检查账号是否可用'); return false; }
        return true;
    }
</script>
</body>
</html>
