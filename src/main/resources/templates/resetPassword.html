<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书城管理系统 - 重置密码</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: url('/loginback.webp') no-repeat center center fixed;
            background-size: cover;
        }
        body::before {
            content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.45); z-index: 0;
        }
        .reset-container {
            position: relative; z-index: 1;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px; padding: 50px 40px; width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }
        .reset-container h2 {
            text-align: center; color: #2c3e50;
            font-size: 24px; margin-bottom: 8px; font-weight: 700;
        }
        .reset-container .subtitle {
            text-align: center; color: #7f8c8d;
            font-size: 14px; margin-bottom: 30px;
        }
        .form-group { margin-bottom: 22px; }
        .form-group label {
            display: block; color: #34495e;
            font-size: 14px; font-weight: 600; margin-bottom: 8px;
        }
        .form-group input {
            width: 100%; padding: 12px 16px;
            border: 2px solid #e0e6ed; border-radius: 10px;
            font-size: 15px; transition: all 0.3s ease;
            outline: none; background: #f8f9fa;
        }
        .form-group input:focus {
            border-color: #e67e22; background: #fff;
            box-shadow: 0 0 0 3px rgba(230, 126, 34, 0.15);
        }
        .btn-reset {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #e67e22, #d35400);
            color: white; border: none; border-radius: 10px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            transition: all 0.3s ease; margin-top: 10px;
        }
        .btn-reset:hover {
            background: linear-gradient(135deg, #d35400, #a04000);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(230, 126, 34, 0.35);
        }
        .error-msg {
            background: #fdecea; color: #e74c3c;
            padding: 10px 14px; border-radius: 8px;
            font-size: 13px; margin-bottom: 20px;
            border-left: 4px solid #e74c3c;
        }
        .tip-msg {
            background: #fef9e7; color: #b7950b;
            padding: 10px 14px; border-radius: 8px;
            font-size: 13px; margin-bottom: 20px;
            border-left: 4px solid #f1c40f;
            line-height: 1.6;
        }
        .back-link {
            text-align: center; margin-top: 24px;
            font-size: 14px; color: #7f8c8d;
        }
        .back-link a {
            color: #3498db; text-decoration: none; font-weight: 600;
        }
        .back-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="reset-container">
    <h2>重置密码</h2>
    <p class="subtitle">Reset Password</p>

    <div th:if="${error}" class="error-msg" th:text="${error}"></div>

    <div class="tip-msg">
        请输入您的账号和注册时填写的昵称进行身份验证。<br>
        验证通过后，密码将被重置为 <strong>123456</strong>。
    </div>

    <form th:action="@{/resetPassword}" method="post" onsubmit="return validateForm()">
        <div class="form-group">
            <label for="username">账号</label>
            <input type="text" id="username" name="username" placeholder="请输入您的账号"
                   th:value="${username}" required>
        </div>
        <div class="form-group">
            <label for="nickname">注册昵称</label>
            <input type="text" id="nickname" name="nickname" placeholder="请输入注册时的昵称" required>
        </div>
        <button type="submit" class="btn-reset">重置密码</button>
    </form>

    <div class="back-link">
        <a th:href="@{/login}">返回登录</a>
    </div>
</div>

<script>
    function validateForm() {
        var username = document.getElementById('username').value.trim();
        var nickname = document.getElementById('nickname').value.trim();
        if (!username) { alert('账号不能为空'); return false; }
        if (!nickname) { alert('昵称不能为空'); return false; }
        return true;
    }
</script>
</body>
</html>
